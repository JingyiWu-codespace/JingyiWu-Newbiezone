<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Race Registration</title>
</head>

<body>
    <h1>Race Registration</h1>
    <form action="">
        <div>
            <label for="firstname">First Name</label>
            <input type="text" id="firstname" name="firstname" required>
            <label for="lastname">Last Name</label>
            <input type="text" id="lastname" name="lastname" required>
        </div>
        <div>
            Select a Race:
        </div>
        <div>
            <input id="fun" type="radio" name="race" value="fun">
            <label for="fun">Fun Run 5k</label>
        </div>
        <div>
            <input id="half" type="radio" name="race" value="half">
            <label for="half">Half Marathon</label>
        </div>
        <div>
            <input id="full" type="radio" name="race" value="full">
            <label for="full">Full Marathon</label>
        </div>
        <div>
            <label for="email">Email</label>
            <input type="email" id="email" name="email">
            <label for="password">Password</label>
            <input type="password" id="password" name="password">
        </div>
        <div>
            <label for="age">Select Age Group</label>
            <select id="age" name="division">
                <option value="kids" selected>Under 18</option>
                <option value="adult">18 TO 25</option>
            </select>
        </div>
        <button type="submit"> Register! </button>

    </form>

</body>

</html>
